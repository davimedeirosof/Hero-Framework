name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats
        run: |
          COMMANDS_REPO=$(find commands -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          COMMANDS=$((COMMANDS_REPO + 5))
          AGENTS_REPO=$(find agents -name "*.md" 2>/dev/null | grep -v README | wc -l | tr -d ' ')
          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          HOOKS=$(find hooks -name "*.js" 2>/dev/null | wc -l | tr -d ' ')
          NAMESPACES=$(find commands -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          AGENTS_EXTRA=9
          AGENTS_INSTALLED=$((AGENTS_REPO + AGENTS_EXTRA))
          AGENTS_NATIVE=5
          AGENTS_TOTAL=$((AGENTS_INSTALLED + AGENTS_NATIVE))
          UPDATED=$(date +"%Y-%m-%d")

          cat > docs/stats.json << EOF
          {
            "commands": $COMMANDS,
            "agents_installed": $AGENTS_INSTALLED,
            "agents_native": $AGENTS_NATIVE,
            "agents_total": $AGENTS_TOTAL,
            "skills": $SKILLS,
            "hooks": $HOOKS,
            "namespaces": $NAMESPACES,
            "updated": "$UPDATED"
          }
          EOF

          echo "COMMANDS=$COMMANDS"         >> $GITHUB_ENV
          echo "AGENTS_TOTAL=$AGENTS_TOTAL" >> $GITHUB_ENV
          echo "SKILLS=$SKILLS"             >> $GITHUB_ENV
          echo "HOOKS=$HOOKS"               >> $GITHUB_ENV
          echo "NAMESPACES=$NAMESPACES"     >> $GITHUB_ENV

      - name: Check if version should increment
        run: |
          COMMIT_MSG=$(git log -1 --format="%s" HEAD)
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEW_VERSION="$MAJOR.$((MINOR + 1))"

          # Ler numeros anteriores do stats.json (se existir)
          PREV_COMMANDS=0; PREV_AGENTS=0; PREV_SKILLS=0; PREV_HOOKS=0; PREV_NAMESPACES=0
          if [ -f docs/stats.json ]; then
            PREV_COMMANDS=$(grep '"commands"'   docs/stats.json | grep -o '[0-9]*' | head -1)
            PREV_AGENTS=$(grep '"agents_total"' docs/stats.json | grep -o '[0-9]*' | head -1)
            PREV_SKILLS=$(grep '"skills"'       docs/stats.json | grep -o '[0-9]*' | head -1)
            PREV_HOOKS=$(grep '"hooks"'         docs/stats.json | grep -o '[0-9]*' | head -1)
            PREV_NAMESPACES=$(grep '"namespaces"' docs/stats.json | grep -o '[0-9]*' | head -1)
          fi

          # Incrementa se qualquer numero mudou
          if [ "$COMMANDS" != "$PREV_COMMANDS" ] || \
             [ "$AGENTS_TOTAL" != "$PREV_AGENTS" ] || \
             [ "$SKILLS" != "$PREV_SKILLS" ] || \
             [ "$HOOKS" != "$PREV_HOOKS" ] || \
             [ "$NAMESPACES" != "$PREV_NAMESPACES" ]; then
            echo $NEW_VERSION > VERSION
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
            echo "SHOULD_ADD_ENTRY=true"    >> $GITHUB_ENV
            echo "Versao incrementada: $CURRENT -> $NEW_VERSION"
          else
            echo "NEW_VERSION=$CURRENT"     >> $GITHUB_ENV
            echo "SHOULD_ADD_ENTRY=false"   >> $GITHUB_ENV
            echo "Versao mantida: $CURRENT (nenhum numero mudou)"
          fi

          SAFE_MSG=$(echo "$COMMIT_MSG" | sed 's/[&/\]/\\&/g' | xargs)
          echo "COMMIT_MSG=$SAFE_MSG" >> $GITHUB_ENV

      - name: Update README
        run: |
          # Numeros sempre atualizados
          sed -i "s/[0-9]* commands, [0-9]* agents, [0-9]* skills, [0-9]* hooks/$COMMANDS commands, $AGENTS_TOTAL agents, $SKILLS skills, $HOOKS hooks/" README.md
          # Versao e titulos so atualizam se houver bump
          if [ "$SHOULD_ADD_ENTRY" = "true" ]; then
            sed -i "s/# Hero-Framework v[0-9]*\.[0-9]*/# Hero-Framework v$NEW_VERSION/" README.md
            sed -i "s/na V[0-9]*\.[0-9]*/na V$NEW_VERSION/g" README.md
          fi

      - name: Update dashboard
        run: |
          # Numeros sempre atualizados via stats.json (carregados pelo JS)
          # Badge, label e coluna so atualizam se houver bump
          if [ "$SHOULD_ADD_ENTRY" = "true" ]; then
            sed -i "s/Disponivel Agora Versao [0-9]*\.[0-9]*/Disponivel Agora Versao $NEW_VERSION/" docs/index.html
            sed -i "s/V1 vs V[0-9]*\.[0-9]*/V1 vs V$NEW_VERSION/g" docs/index.html
            sed -i "s|<div class=\"comp-cell\">V[0-9]*\.[0-9]*</div>|<div class=\"comp-cell\">V$NEW_VERSION</div>|g" docs/index.html
          fi

      - name: Add version entry to versions.html
        if: env.SHOULD_ADD_ENTRY == 'true'
        run: |
          DATE=$(date +"%b %Y")
          cat > /tmp/new_version.html << HTMLEOF

          <!-- V${NEW_VERSION} -->
          <div class="version-block">
            <div class="version-tag">
              <div class="version-badge">V${NEW_VERSION}</div>
              <div class="version-date">${DATE}</div>
            </div>
            <div class="version-content">
              <div class="version-title">Atualizacao V${NEW_VERSION}</div>
              <div class="version-subtitle">${COMMIT_MSG}</div>
              <div class="change-group" style="margin-top:1rem;">
                <div class="change-group-label">Numeros nesta versao</div>
                <div class="stat-chips">
                  <span class="stat-chip">${COMMANDS} commands</span>
                  <span class="stat-chip">${AGENTS_TOTAL} agentes</span>
                  <span class="stat-chip">${SKILLS} skills</span>
                  <span class="stat-chip">${HOOKS} hooks</span>
                  <span class="stat-chip">14 marketplaces</span>
                  <span class="stat-chip">${NAMESPACES} namespaces</span>
                </div>
              </div>
            </div>
          </div>
          HTMLEOF
          sed -i '/<!-- TIMELINE_INSERT_HERE -->/r /tmp/new_version.html' docs/versions.html

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION README.md docs/stats.json docs/index.html docs/versions.html
          git diff --staged --quiet || git commit -m "chore: v$NEW_VERSION - atualiza stats, versao e historico [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
